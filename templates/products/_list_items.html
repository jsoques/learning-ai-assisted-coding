{% for product in products %}
<div class="bg-white rounded-lg shadow p-4">
    <h3 class="font-semibold text-lg">{{ product.name }}</h3>
    <p class="text-gray-500 text-sm mt-1">{{ product.description[:100] }}{% if product.description|length > 100 %}...{% endif %}</p>
    <p class="text-xl font-bold text-indigo-600 mt-2">${{ "%.2f"|format(product.price|float) }}</p>
    <p class="text-sm text-gray-400">SKU: {{ product.sku }}</p>
    <div class="mt-3 flex space-x-2">
        <a href="/products/{{ product.id }}" class="flex-1 text-center bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700">View</a>
        <button class="bg-green-600 text-white px-3 py-2 rounded hover:bg-green-700"
                hx-post="/cart/add/{{ product.id }}"
                hx-target="#cart-status"
                hx-swap="innerHTML">+ Cart</button>
    </div>
</div>
{% else %}
<div class="col-span-full text-center py-12">
    <p class="text-gray-500 text-lg">No products found.</p>
</div>
{% endfor %}

{% extends "base.html" %}

{% block title %}Change Password - Shop{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <h1 class="text-2xl font-bold mb-6">Change Password</h1>
    {% if error %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">{{ error }}</div>
    {% endif %}
    {% if message %}
    <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">{{ message }}</div>
    {% endif %}
    <form hx-post="/auth/change-password" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Current Password</label>
            <input type="password" name="current_password" required class="mt-1 block w-full border rounded px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">New Password</label>
            <input type="password" name="new_password" required minlength="8" class="mt-1 block w-full border rounded px-3 py-2">
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700">Change Password</button>
    </form>
</div>
{% endblock %}

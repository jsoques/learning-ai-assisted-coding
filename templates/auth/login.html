{% extends "base.html" %}

{% block title %}Login - Shop{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <h1 class="text-2xl font-bold mb-6">Login</h1>
    {% if error %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/auth/login" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Email</label>
            <input type="email" name="email" required class="mt-1 block w-full border rounded px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Password</label>
            <input type="password" name="password" required class="mt-1 block w-full border rounded px-3 py-2">
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700">Login</button>
    </form>
    <p class="mt-4 text-sm text-gray-600">Don't have an account? <a href="/auth/register" class="text-indigo-600">Register</a></p>
</div>
{% endblock %}
